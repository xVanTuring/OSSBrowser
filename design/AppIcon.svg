<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: warm Alibaba-Cloud orange, lit from the top (macOS convention) -->
    <linearGradient id="bg" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FFC46B"/>
      <stop offset="0.5" stop-color="#FF8A2A"/>
      <stop offset="1"   stop-color="#F15A00"/>
    </linearGradient>

    <!-- Subtle top sheen -->
    <linearGradient id="sheen" x1="512" y1="100" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Bucket body: near-white with a hint of form -->
    <linearGradient id="body" x1="512" y1="360" x2="512" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1E9E2"/>
    </linearGradient>

    <!-- Bucket opening: shadowed interior -->
    <linearGradient id="inside" x1="512" y1="330" x2="512" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C25A12"/>
      <stop offset="1" stop-color="#9C440A"/>
    </linearGradient>

    <!-- Soft contact shadow under the icon -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- macOS squircle body: 824x824 centered in 1024, corner radius ~184 -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#bg)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#sheen)"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="183.5" ry="183.5"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>

  <!-- OSS "bucket" mark -->
  <g>
    <!-- handle: drawn first so its ends tuck behind the rim, leaving a clean arc -->
    <path d="M360 360 Q512 248 664 360" fill="none" stroke="url(#body)"
          stroke-width="28" stroke-linecap="round"/>
    <!-- bucket body (gentle pail taper) -->
    <path d="M312 380 L356 690 A156 30 0 0 0 668 690 L712 380 A200 52 0 0 1 312 380 Z"
          fill="url(#body)"/>
    <!-- shadowed opening -->
    <ellipse cx="512" cy="380" rx="200" ry="52" fill="url(#inside)"/>
  </g>
</svg>
